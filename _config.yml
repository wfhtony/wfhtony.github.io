# Deployment
## Docs: http://hexo.io/docs/deployment.html
deploy:
  type: git
  message: update
  repo:
      github: git@github.com:wfhtony/wfhtony.github.io.git
      gitcafe: git@git.coding.net:wfhtony/wfhtony.git
	  
backup:
    type: git
    theme: landscape-plus
    message: backup
    repository:
       github: git@github.com:wfhtony/wfhtony.github.io.git,backup
       gitcafe: git@git.coding.net:wfhtony/wfhtony.git,backup